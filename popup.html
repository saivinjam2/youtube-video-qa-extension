<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YouTube Q&A Settings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f0f;
      color: #fff;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }

    .emoji { font-size: 24px; }

    label {
      display: block;
      font-size: 12px;
      color: #aaa;
      margin-bottom: 6px;
    }

    input[type="password"], input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus { border-color: #ff4444; }

    .toggle {
      font-size: 11px;
      color: #888;
      cursor: pointer;
      margin-top: 6px;
      display: inline-block;
    }
    .toggle:hover { color: #fff; }

    button {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: #ff4444;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #e03333; }

    .status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
      color: #4caf50;
    }

    .status.error { color: #ff4444; }

    .divider {
      border: none;
      border-top: 1px solid #222;
      margin: 16px 0;
    }

    .info {
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }

    .info a {
      color: #ff4444;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="header">
    <span class="emoji">🎬</span>
    <h1>YouTube Q&amp;A</h1>
  </div>

  <label for="apiKey">Groq API Key</label>
  <input type="password" id="apiKey" placeholder="gsk_..." />
  <span class="toggle" id="toggleVisibility">Show key</span>

  <button id="saveBtn">Save Key</button>
  <div class="status" id="status"></div>

  <hr class="divider" />

  <p class="info">
    Get your API key at
    <a href="https://console.groq.com" target="_blank">console.groq.com</a>.
    Your key is stored locally and never shared.
  </p>

  <script src="popup.js"></script>
</body>
</html>
